<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gallery &middot; Jason&rsquo;s Blog</title>
  <meta name="description" content="Photos I've taken and drawings I've made.">
  <link rel="icon" href="assets/favicon.ico">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="site">
    <header class="site-header">
      <div class="container">
        <a href="/" class="site-name">Jason&rsquo;s Blog</a>
        <nav class="site-nav" aria-label="Primary">
          <a href="resume.html">Resume</a>
          <a href="projects.html">Projects</a>
          <a href="books.html">Books</a>
          <a href="gallery.html" aria-current="page">Gallery</a>
        </nav>
      </div>
    </header>

    <main>
      <div class="container">
        <h1>Gallery</h1>
        <p class="lead muted">Photos I take and drawings I make.</p>

        <div class="gallery-filter" id="gallery-filter" role="group" aria-label="Filter gallery"></div>

        <div class="gallery-masonry" id="gallery"></div>
        <p class="muted small" id="gallery-empty">준비 중입니다.</p>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container">
        <span>&copy; Jason Lee</span>
        <ul class="footer-links">
          <li><a href="https://github.com/jasonleex1995">GitHub</a></li>
          <li><a class="email-link" data-user="jasonleex1995" data-domain="gmail.com" href="#">Email</a><script>(function(){var a=document.currentScript.previousElementSibling;a.href='mailto:'+a.dataset.user+'@'+a.dataset.domain;})();</script></li>
        </ul>
      </div>
    </footer>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer">
    <button class="lightbox-btn lightbox-close" id="lb-close" aria-label="Close (Esc)">&times;</button>
    <button class="lightbox-btn lightbox-prev" id="lb-prev" aria-label="Previous">&#8249;</button>
    <button class="lightbox-btn lightbox-next" id="lb-next" aria-label="Next">&#8250;</button>
    <img id="lb-img" src="" alt="">
    <div class="lightbox-caption" id="lb-caption"></div>
  </div>

  <script>
    (function () {
      var DIRS = { photo: 'assets/photos/', drawing: 'assets/drawings/' };
      var LABELS = { photo: 'Photos', drawing: 'Drawings' };
      var ORDER = ['photo', 'drawing'];

      var galleryEl = document.getElementById('gallery');
      var filterEl = document.getElementById('gallery-filter');
      var emptyEl = document.getElementById('gallery-empty');

      var items = [];        // all items, each augmented with .figure + .index
      var visible = [];      // currently visible items (for lightbox nav)
      var currentFilter = 'all';
      var lbIndex = 0;

      function fmtDate(d) { return d ? String(d).replace(/-/g, '.') : ''; }

      function altText(it) {
        if (it.alt) return it.alt;
        var base = it.type === 'drawing' ? 'Drawing' : 'Photo';
        return it.date ? base + ', ' + fmtDate(it.date) : base;
      }

      function captionText(it) {
        return it.caption || fmtDate(it.date);
      }

      function buildFilters(types) {
        var defs = [{ key: 'all', label: 'All', count: items.length }];
        ORDER.forEach(function (t) {
          if (types[t]) defs.push({ key: t, label: LABELS[t], count: types[t] });
        });
        // Only show filter bar if there's more than one type
        if (defs.length <= 2) { filterEl.style.display = 'none'; return; }

        defs.forEach(function (d) {
          var btn = document.createElement('button');
          btn.className = 'filter-btn';
          btn.type = 'button';
          btn.dataset.filter = d.key;
          btn.setAttribute('aria-pressed', d.key === 'all' ? 'true' : 'false');
          btn.innerHTML = d.label + '<span class="count">' + d.count + '</span>';
          btn.addEventListener('click', function () { applyFilter(d.key); });
          filterEl.appendChild(btn);
        });
      }

      function applyFilter(key) {
        currentFilter = key;
        filterEl.querySelectorAll('.filter-btn').forEach(function (b) {
          b.setAttribute('aria-pressed', b.dataset.filter === key ? 'true' : 'false');
        });
        visible = [];
        items.forEach(function (it) {
          var show = key === 'all' || it.type === key;
          it.figure.classList.toggle('is-hidden', !show);
          if (show) visible.push(it);
        });
      }

      /* ---------- Mosaic layout (no crop) ----------
         CSS sets the column span (portrait/square = 3 units, landscape = 4).
         Here we (a) tag landscapes with .wide and (b) set each figure's
         grid-row span from its rendered height so nothing is cropped. */
      var ROW_UNIT = 8, ROW_GAP = 12, WIDE_RATIO = 1.3;

      function layoutFigure(it) {
        var img = it.img;
        if (!img || !img.naturalWidth) return;
        it.figure.classList.toggle('wide', img.naturalWidth / img.naturalHeight >= WIDE_RATIO);
        var h = img.getBoundingClientRect().height;   // measured after the .wide width change
        if (h) it.figure.style.gridRowEnd = 'span ' + Math.ceil((h + ROW_GAP) / ROW_UNIT);
      }

      function relayoutAll() {
        items.forEach(function (it) {
          if (it.figure && !it.figure.classList.contains('is-hidden')) layoutFigure(it);
        });
      }

      function render(list) {
        var frag = document.createDocumentFragment();
        list.forEach(function (it, i) {
          var fig = document.createElement('figure');
          var img = document.createElement('img');
          img.src = (DIRS[it.type] || '') + it.file;
          img.alt = altText(it);
          img.loading = 'eager';
          img.decoding = 'async';
          img.addEventListener('click', function () { openLightbox(it); });
          img.addEventListener('load', function () { requestAnimationFrame(function () { layoutFigure(it); }); });
          fig.appendChild(img);
          var cap = captionText(it);
          if (cap) {
            var fc = document.createElement('figcaption');
            fc.textContent = cap;
            fig.appendChild(fc);
          }
          it.figure = fig;
          it.img = img;
          it.index = i;
          frag.appendChild(fig);
        });
        galleryEl.appendChild(frag);
        items.forEach(function (it) { if (it.img && it.img.complete) layoutFigure(it); });
      }

      var resizeTimer;
      window.addEventListener('resize', function () {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(relayoutAll, 150);
      });

      /* ---------- Lightbox ---------- */
      var lb = document.getElementById('lightbox');
      var lbImg = document.getElementById('lb-img');
      var lbCap = document.getElementById('lb-caption');

      function showAt(idx) {
        if (!visible.length) return;
        lbIndex = (idx + visible.length) % visible.length;
        var it = visible[lbIndex];
        lbImg.src = (DIRS[it.type] || '') + it.file;
        lbImg.alt = altText(it);
        lbCap.textContent = captionText(it);
      }

      function openLightbox(it) {
        var idx = visible.indexOf(it);
        if (idx < 0) idx = 0;
        showAt(idx);
        lb.classList.add('is-open');
        document.body.style.overflow = 'hidden';
      }

      function closeLightbox() {
        lb.classList.remove('is-open');
        lbImg.src = '';
        document.body.style.overflow = '';
      }

      document.getElementById('lb-close').addEventListener('click', closeLightbox);
      document.getElementById('lb-prev').addEventListener('click', function () { showAt(lbIndex - 1); });
      document.getElementById('lb-next').addEventListener('click', function () { showAt(lbIndex + 1); });
      lb.addEventListener('click', function (e) { if (e.target === lb) closeLightbox(); });
      document.addEventListener('keydown', function (e) {
        if (!lb.classList.contains('is-open')) return;
        if (e.key === 'Escape') closeLightbox();
        else if (e.key === 'ArrowLeft') showAt(lbIndex - 1);
        else if (e.key === 'ArrowRight') showAt(lbIndex + 1);
      });

      /* ---------- Init ---------- */
      fetch('data/gallery.json', { cache: 'no-cache' })
        .then(function (r) { if (!r.ok) throw new Error('no manifest'); return r.json(); })
        .then(function (data) {
          items = Array.isArray(data.items) ? data.items : [];
          if (!items.length) return;
          emptyEl.remove();

          var types = {};
          items.forEach(function (it) { types[it.type] = (types[it.type] || 0) + 1; });

          render(items);
          buildFilters(types);
          applyFilter('all');
        })
        .catch(function () { emptyEl.textContent = '갤러리를 불러오지 못했습니다.'; });
    })();
  </script>
</body>
</html>
